openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: audit
    description: Accessibility audit operations
  - name: lead
    description: Lead capture operations
  - name: monitor
    description: Compliance monitoring operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /audit:
    post:
      operationId: createAudit
      tags: [audit]
      summary: Submit URL for accessibility audit
      description: Runs an automated accessibility audit on the provided URL and returns a compliance snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuditBody"
      responses:
        "200":
          description: Audit result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditResult"
        "400":
          description: Invalid URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Audit failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /audit/batch:
    post:
      operationId: createBatchAudit
      tags: [audit]
      summary: "Batch audit up to 10 URLs: streams SSE progress events"
      description: |
        Scans up to 10 URLs serially (one browser, one URL at a time) using Server-Sent Events (SSE).
        The response is a `text/event-stream` stream. Each `data:` frame contains a JSON object
        with a `type` field:
        - `{ type: "scanning", url, index }`: fired when a URL scan begins
        - `{ type: "page", index, url, status, score, level, auditId, error? }`: fired when a URL scan finishes, or when a URL is skipped (e.g. client disconnected before Playwright started)
        - `{ type: "complete", siteScore, siteLevel, pages[], crossPageViolations[], scannedAt }`: final aggregated result (omitted if the client has already closed the stream)
        - `{ type: "error", message }`: emitted if processing fails
        Validation errors (bad URLs etc.) return a 400 JSON response before streaming begins.
        The site-wide score is a `totalChecks`-weighted average of **successful** page scores only (failed or client-skipped pages are excluded).
        `crossPageViolations` deduplicates axe rule ids across successful pages only, then sorts by impact (critical first), then page count, then total affected elements.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBatchAuditBody"
      responses:
        "200":
          description: SSE stream of batch audit progress events ending with the aggregated BatchAuditResult
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Newline-delimited SSE frames. Each frame is `data: <JSON>\n\n`.
                  See endpoint description for event shape details.
                  The final `complete` event payload matches the BatchAuditResult schema.
        "400":
          description: Validation error (returned as JSON before streaming begins)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Batch audit failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /audit/batch-pdf:
    post:
      operationId: createBatchAuditPdf
      tags: [audit]
      summary: Download combined multi-page accessibility report as PDF
      description: |
        Accepts an array of auditIds (from a prior batch scan) and generates a branded
        multi-page PDF: a cover page with a site-wide summary followed by a per-page
        section for each successfully scanned URL. Only include auditIds for successful
        pages (failed scans have an empty auditId and are not persisted).
        The cover page site score uses the same `totalChecks`-weighted formula as the batch SSE `complete` event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBatchAuditPdfBody"
      responses:
        "200":
          description: Multi-page PDF report
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid request (no auditIds provided or bad format)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No audit results found for the provided IDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: PDF generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /audit/{auditId}:
    get:
      operationId: getAudit
      tags: [audit]
      summary: Get audit result by ID
      description: Retrieve a previously run audit result
      parameters:
        - name: auditId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditResult"
        "404":
          description: Audit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /audit/{auditId}/pdf:
    get:
      operationId: getAuditPdf
      tags: [audit]
      summary: Download audit result as PDF
      description: Generates and returns a branded PDF report for a previously run audit
      parameters:
        - name: auditId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF report file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid audit ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Audit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: PDF generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads:
    post:
      operationId: createLead
      tags: [lead]
      summary: Capture a lead from an audit result
      description: Stores a visitor's name and email after they view a compliance snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Lead captured successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /monitor:
    post:
      operationId: createMonitor
      tags: [monitor]
      summary: Register a URL for ongoing monitoring
      description: Registers a URL for periodic accessibility re-scans and email summaries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonitorBody"
      responses:
        "201":
          description: Monitoring registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMonitorResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /monitor/{token}:
    get:
      operationId: getMonitor
      tags: [monitor]
      summary: Get monitoring history by token
      description: Returns scan history and current status for a monitored URL
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Monitoring data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorResponse"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          description: "`ok` when accepting traffic; `draining` during graceful shutdown."
        scanEngineReady:
          type: boolean
          description: True when Chromium was probed successfully at startup.
        scansInFlight:
          type: integer
          description: Active scans holding a concurrency slot.
        scansQueued:
          type: integer
          description: Scans waiting for a concurrency slot.
      required:
        - status

    ScanViewportUsed:
      type: object
      properties:
        width:
          type: integer
        height:
          type: integer
        label:
          type: string
      required:
        - width
        - height
        - label

    RuntimeDiagnostics:
      type: object
      properties:
        consoleErrors:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              text:
                type: string
            required:
              - type
              - text
        failedRequests:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              errorText:
                type: string
            required:
              - url
      required:
        - consoleErrors

    ScanMetadata:
      type: object
      properties:
        profile:
          type: string
          enum: [default, strict]
        multiViewport:
          type: boolean
        viewportsUsed:
          type: array
          items:
            $ref: "#/components/schemas/ScanViewportUsed"
        runtimeDiagnostics:
          $ref: "#/components/schemas/RuntimeDiagnostics"
        complianceReport:
          $ref: "#/components/schemas/ComplianceReport"
        supplementalFindings:
          type: array
          items:
            $ref: "#/components/schemas/SupplementalFinding"
        discoverySource:
          type: string
          enum: [sitemap, links, single]
          description: How whole-site URLs were discovered.
      required:
        - profile
        - multiViewport
        - viewportsUsed

    CreateAuditBody:
      type: object
      properties:
        url:
          type: string
          description: The URL to audit for accessibility compliance
        profile:
          type: string
          enum: [default, strict]
          description: |
            `strict` includes additional AAA-oriented axe tags. Default `default` (WCAG 2.x AA-oriented set).
        multiViewport:
          type: boolean
          description: |
            When true, runs axe at mobile and desktop breakpoints and merges results (slower). Default false.
        wholeSite:
          type: boolean
          description: |
            When true with batch endpoint, discovers up to 10 same-origin pages via sitemap or homepage links.
      required:
        - url

    AuditViolationInstance:
      type: object
      description: One DOM node axe flagged for this rule (up to 3 per violation on new audits)
      properties:
        selector:
          type: string
          description: CSS selector chain from axe (joined target segments)
        htmlSnippet:
          type: string
          description: Truncated outer HTML of the element in the scanned page
        failureSummary:
          type: string
          description: Axe human-readable reason this node failed the check
        elementScreenshot:
          type: string
          description: |
            JPEG data URL of the node's rendered bounds (Playwright engine only; omitted when capture fails).
        checkDetails:
          type: array
          items:
            type: string
          description: Messages from axe check results attached to this node (`any` / `all` / `none`).
      required:
        - selector
        - htmlSnippet

    AuditViolation:
      type: object
      properties:
        id:
          type: string
          description: WCAG criterion ID (e.g. "color-contrast")
        wcagCriteria:
          type: string
          description: WCAG criterion reference (e.g. "1.4.3 Contrast Minimum")
        description:
          type: string
        impact:
          type: string
          enum: [minor, moderate, serious, critical]
        affectedElements:
          type: integer
          description: Number of affected elements on the page
        topSelectors:
          type: array
          items:
            type: string
          description: Up to 3 representative CSS selectors for affected elements
        help:
          type: string
          description: Short remediation guidance from axe-core for this rule.
        helpUrl:
          type: string
          description: Link to axe rule documentation (Deque University).
        instanceDetails:
          type: array
          items:
            $ref: "#/components/schemas/AuditViolationInstance"
          description: |
            Up to 3 affected nodes with selector, HTML, failure text, optional element screenshot, and axe check messages.
            Omitted on legacy audits. Remote scans do not include original source file line numbers; use DevTools with the selector.
        detectedInViewports:
          type: array
          items:
            type: string
          description: Breakpoint labels when this finding was merged from a multi-viewport scan.
        en301549Clause:
          type: string
          description: EN 301 549 clause reference (BITV 2.0 / BFSG mapping).
        bitvSection:
          type: string
          description: BITV 2.0 section label.
        titleDe:
          type: string
          description: German title for compliance reporting.
      required:
        - id
        - wcagCriteria
        - description
        - impact
        - affectedElements
        - topSelectors

    SupplementalFinding:
      type: object
      properties:
        id:
          type: string
        titleDe:
          type: string
        titleEn:
          type: string
        status:
          type: string
          enum: [pass, fail, warning]
        description:
          type: string
        impact:
          type: string
          enum: [minor, moderate, serious, critical]
        en301549Clause:
          type: string
        bitvSection:
          type: string
      required:
        - id
        - titleDe
        - titleEn
        - status
        - description
        - impact

    ComplianceClauseFinding:
      type: object
      properties:
        en301549Clause:
          type: string
        bitvSection:
          type: string
        wcagCriterion:
          type: string
        titleDe:
          type: string
        titleEn:
          type: string
        status:
          type: string
          enum: [conformant, non_conformant, needs_manual_review]
        violationCount:
          type: integer
        relatedRuleIds:
          type: array
          items:
            type: string
      required:
        - en301549Clause
        - bitvSection
        - titleDe
        - titleEn
        - status
        - violationCount
        - relatedRuleIds

    ComplianceReport:
      type: object
      properties:
        framework:
          type: string
        frameworkVersion:
          type: string
        legalContextDe:
          type: string
        legalContextEn:
          type: string
        overallStatus:
          type: string
          enum: [conformant, non_conformant, needs_manual_review]
        wcagLevel:
          type: string
        clauseFindings:
          type: array
          items:
            $ref: "#/components/schemas/ComplianceClauseFinding"
        supplementalFindings:
          type: array
          items:
            $ref: "#/components/schemas/SupplementalFinding"
        manualReviewRequired:
          type: array
          items:
            type: string
        summaryDe:
          type: string
        summaryEn:
          type: string
      required:
        - framework
        - frameworkVersion
        - legalContextDe
        - legalContextEn
        - overallStatus
        - wcagLevel
        - clauseFindings
        - supplementalFindings
        - manualReviewRequired
        - summaryDe
        - summaryEn

    AuditResult:
      type: object
      properties:
        auditId:
          type: string
        url:
          type: string
        scannedAt:
          type: string
          format: date-time
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: Overall accessibility compliance score
        level:
          type: string
          enum: [critical, poor, moderate, good, excellent]
          description: Score level label
        totalViolations:
          type: integer
        criticalViolations:
          type: integer
        seriousViolations:
          type: integer
        violations:
          type: array
          items:
            $ref: "#/components/schemas/AuditViolation"
        passedChecks:
          type: integer
        totalChecks:
          type: integer
        scanEngine:
          type: string
          enum: [playwright, static_fallback, unknown]
          description: |
            Engine used for this audit: `playwright` is headless Chromium with axe (full JS/DOM).
            `static_fallback` is HTML fetched into JSDOM when the browser engine fails (no client-side JS).
            `unknown` is stored for legacy rows before this field existed.
        pageScreenshot:
          type: string
          description: |
            Viewport JPEG data URL of the page after the axe run (Playwright only). Omitted for static fallback, legacy rows, or when capture failed.
        scanMetadata:
          $ref: "#/components/schemas/ScanMetadata"
          description: Scan options, viewports used, and optional runtime diagnostics (Playwright). Omitted on legacy rows.
        complianceReport:
          $ref: "#/components/schemas/ComplianceReport"
          description: BITV 2.0 / BFSG (EN 301 549) compliance assessment. Also available in scanMetadata when present.
      required:
        - auditId
        - url
        - scannedAt
        - score
        - level
        - totalViolations
        - criticalViolations
        - seriousViolations
        - violations
        - passedChecks
        - totalChecks
        - scanEngine

    CreateLeadBody:
      type: object
      properties:
        name:
          type: string
          description: Visitor's full name
        email:
          type: string
          format: email
          description: Visitor's email address
        auditId:
          type: string
          description: The audit result they are requesting the full report for
      required:
        - name
        - email

    LeadResponse:
      type: object
      properties:
        leadId:
          type: string
        name:
          type: string
        email:
          type: string
        auditId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - leadId
        - name
        - email
        - createdAt

    CreateMonitorBody:
      type: object
      properties:
        url:
          type: string
          description: The URL to monitor
        email:
          type: string
          format: email
          description: Email address for scan summaries
        frequency:
          type: string
          enum: [weekly, monthly]
          description: How often to re-scan the URL
        auditId:
          type: string
          description: Optional existing audit ID to seed the first monitoring scan from
      required:
        - url
        - email
        - frequency

    CreateMonitorResponse:
      type: object
      properties:
        token:
          type: string
          description: Unique token to access monitoring results
        url:
          type: string
        frequency:
          type: string
          enum: [weekly, monthly]
        email:
          type: string
      required:
        - token
        - url
        - frequency
        - email

    MonitorScanResult:
      type: object
      properties:
        id:
          type: string
        score:
          type: integer
          minimum: 0
          maximum: 100
        level:
          type: string
          enum: [critical, poor, moderate, good, excellent]
        totalViolations:
          type: integer
        criticalViolations:
          type: integer
        seriousViolations:
          type: integer
        passedChecks:
          type: integer
        totalChecks:
          type: integer
        scannedAt:
          type: string
          format: date-time
      required:
        - id
        - score
        - level
        - totalViolations
        - criticalViolations
        - seriousViolations
        - passedChecks
        - totalChecks
        - scannedAt

    MonitorResponse:
      type: object
      properties:
        url:
          type: string
        frequency:
          type: string
          enum: [weekly, monthly]
        createdAt:
          type: string
          format: date-time
        nextScanAt:
          type: string
          format: date-time
        scans:
          type: array
          items:
            $ref: "#/components/schemas/MonitorScanResult"
        latest:
          $ref: "#/components/schemas/MonitorLatest"
          nullable: true
      required:
        - url
        - frequency
        - createdAt
        - nextScanAt
        - scans

    MonitorLatest:
      type: object
      properties:
        score:
          type: integer
        level:
          type: string
          enum: [critical, poor, moderate, good, excellent]
        totalViolations:
          type: integer
        criticalViolations:
          type: integer
        seriousViolations:
          type: integer
        violations:
          type: array
          items:
            $ref: "#/components/schemas/AuditViolation"
        passedChecks:
          type: integer
        totalChecks:
          type: integer
        scannedAt:
          type: string
          format: date-time
      required:
        - score
        - level
        - totalViolations
        - criticalViolations
        - seriousViolations
        - violations
        - passedChecks
        - totalChecks
        - scannedAt

    CreateBatchAuditBody:
      type: object
      properties:
        urls:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 10
          description: List of URLs to scan (1–10). Omit when wholeSite is true.
        url:
          type: string
          description: Seed URL for whole-site discovery when wholeSite is true.
        wholeSite:
          type: boolean
          description: Discover up to 10 same-origin pages from sitemap.xml or homepage links.
        profile:
          type: string
          enum: [default, strict]
        multiViewport:
          type: boolean
          description: Run mobile + desktop axe passes and merge results.

    CreateBatchAuditPdfBody:
      type: object
      properties:
        auditIds:
          type: array
          items:
            type: string
          minItems: 1
          description: Array of auditIds from successful batch page scans to include in the PDF
      required:
        - auditIds

    BatchPageResult:
      type: object
      properties:
        auditId:
          type: string
        url:
          type: string
        score:
          type: integer
          minimum: 0
          maximum: 100
        level:
          type: string
          enum: [critical, poor, moderate, good, excellent]
        totalViolations:
          type: integer
        criticalViolations:
          type: integer
        seriousViolations:
          type: integer
        passedChecks:
          type: integer
        totalChecks:
          type: integer
        scannedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [success, error]
        error:
          type: string
          nullable: true
        scanEngine:
          type: string
          enum: [playwright, static_fallback, unknown]
          nullable: true
          description: "Present when status is success: which engine produced the page result"
      required:
        - auditId
        - url
        - score
        - level
        - totalViolations
        - criticalViolations
        - seriousViolations
        - passedChecks
        - totalChecks
        - scannedAt
        - status

    CrossPageViolation:
      type: object
      properties:
        id:
          type: string
        wcagCriteria:
          type: string
        description:
          type: string
        impact:
          type: string
          enum: [minor, moderate, serious, critical]
        pageCount:
          type: integer
          description: Number of pages this violation appears on
        totalAffectedElements:
          type: integer
          description: Total affected elements across all pages
        affectedUrls:
          type: array
          items:
            type: string
      required:
        - id
        - wcagCriteria
        - description
        - impact
        - pageCount
        - totalAffectedElements
        - affectedUrls

    BatchAuditResult:
      type: object
      properties:
        siteScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Weighted average score across successful pages only; each page weighted by axe totalChecks
        siteLevel:
          type: string
          enum: [critical, poor, moderate, good, excellent]
        pages:
          type: array
          items:
            $ref: "#/components/schemas/BatchPageResult"
        crossPageViolations:
          type: array
          items:
            $ref: "#/components/schemas/CrossPageViolation"
          description: Violations from successful pages only, deduplicated by axe rule id; sorted by impact severity, then page count, then total affected elements
        scannedAt:
          type: string
          format: date-time
      required:
        - siteScore
        - siteLevel
        - pages
        - crossPageViolations
        - scannedAt

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

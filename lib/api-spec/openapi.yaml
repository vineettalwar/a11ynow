openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: audit
    description: Accessibility audit operations
  - name: lead
    description: Lead capture operations
  - name: monitor
    description: Compliance monitoring operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /audit:
    post:
      operationId: createAudit
      tags: [audit]
      summary: Submit URL for accessibility audit
      description: Runs an automated accessibility audit on the provided URL and returns a compliance snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuditBody"
      responses:
        "200":
          description: Audit result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditResult"
        "400":
          description: Invalid URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Audit failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /audit/{auditId}:
    get:
      operationId: getAudit
      tags: [audit]
      summary: Get audit result by ID
      description: Retrieve a previously run audit result
      parameters:
        - name: auditId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditResult"
        "404":
          description: Audit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /audit/{auditId}/pdf:
    get:
      operationId: getAuditPdf
      tags: [audit]
      summary: Download audit result as PDF
      description: Generates and returns a branded PDF report for a previously run audit
      parameters:
        - name: auditId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF report file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid audit ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Audit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: PDF generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads:
    post:
      operationId: createLead
      tags: [lead]
      summary: Capture a lead from an audit result
      description: Stores a visitor's name and email after they view a compliance snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Lead captured successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /monitor:
    post:
      operationId: createMonitor
      tags: [monitor]
      summary: Register a URL for ongoing monitoring
      description: Registers a URL for periodic accessibility re-scans and email summaries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonitorBody"
      responses:
        "201":
          description: Monitoring registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMonitorResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /monitor/{token}:
    get:
      operationId: getMonitor
      tags: [monitor]
      summary: Get monitoring history by token
      description: Returns scan history and current status for a monitored URL
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Monitoring data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorResponse"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CreateAuditBody:
      type: object
      properties:
        url:
          type: string
          description: The URL to audit for accessibility compliance
      required:
        - url

    AuditViolation:
      type: object
      properties:
        id:
          type: string
          description: WCAG criterion ID (e.g. "color-contrast")
        wcagCriteria:
          type: string
          description: WCAG criterion reference (e.g. "1.4.3 Contrast Minimum")
        description:
          type: string
        impact:
          type: string
          enum: [minor, moderate, serious, critical]
        affectedElements:
          type: integer
          description: Number of affected elements on the page
        topSelectors:
          type: array
          items:
            type: string
          description: Up to 3 representative CSS selectors for affected elements
      required:
        - id
        - wcagCriteria
        - description
        - impact
        - affectedElements
        - topSelectors

    AuditResult:
      type: object
      properties:
        auditId:
          type: string
        url:
          type: string
        scannedAt:
          type: string
          format: date-time
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: Overall accessibility compliance score
        level:
          type: string
          enum: [critical, poor, moderate, good, excellent]
          description: Score level label
        totalViolations:
          type: integer
        criticalViolations:
          type: integer
        seriousViolations:
          type: integer
        violations:
          type: array
          items:
            $ref: "#/components/schemas/AuditViolation"
        passedChecks:
          type: integer
        totalChecks:
          type: integer
      required:
        - auditId
        - url
        - scannedAt
        - score
        - level
        - totalViolations
        - criticalViolations
        - seriousViolations
        - violations
        - passedChecks
        - totalChecks

    CreateLeadBody:
      type: object
      properties:
        name:
          type: string
          description: Visitor's full name
        email:
          type: string
          format: email
          description: Visitor's email address
        auditId:
          type: string
          description: The audit result they are requesting the full report for
      required:
        - name
        - email

    LeadResponse:
      type: object
      properties:
        leadId:
          type: string
        name:
          type: string
        email:
          type: string
        auditId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - leadId
        - name
        - email
        - createdAt

    CreateMonitorBody:
      type: object
      properties:
        url:
          type: string
          description: The URL to monitor
        email:
          type: string
          format: email
          description: Email address for scan summaries
        frequency:
          type: string
          enum: [weekly, monthly]
          description: How often to re-scan the URL
        auditId:
          type: string
          description: Optional existing audit ID to seed the first monitoring scan from
      required:
        - url
        - email
        - frequency

    CreateMonitorResponse:
      type: object
      properties:
        token:
          type: string
          description: Unique token to access monitoring results
        url:
          type: string
        frequency:
          type: string
          enum: [weekly, monthly]
        email:
          type: string
      required:
        - token
        - url
        - frequency
        - email

    MonitorScanResult:
      type: object
      properties:
        id:
          type: string
        score:
          type: integer
          minimum: 0
          maximum: 100
        level:
          type: string
          enum: [critical, poor, moderate, good, excellent]
        totalViolations:
          type: integer
        criticalViolations:
          type: integer
        seriousViolations:
          type: integer
        passedChecks:
          type: integer
        totalChecks:
          type: integer
        scannedAt:
          type: string
          format: date-time
      required:
        - id
        - score
        - level
        - totalViolations
        - criticalViolations
        - seriousViolations
        - passedChecks
        - totalChecks
        - scannedAt

    MonitorResponse:
      type: object
      properties:
        url:
          type: string
        frequency:
          type: string
          enum: [weekly, monthly]
        createdAt:
          type: string
          format: date-time
        nextScanAt:
          type: string
          format: date-time
        scans:
          type: array
          items:
            $ref: "#/components/schemas/MonitorScanResult"
        latest:
          $ref: "#/components/schemas/MonitorLatest"
          nullable: true
      required:
        - url
        - frequency
        - createdAt
        - nextScanAt
        - scans

    MonitorLatest:
      type: object
      properties:
        score:
          type: integer
        level:
          type: string
          enum: [critical, poor, moderate, good, excellent]
        totalViolations:
          type: integer
        criticalViolations:
          type: integer
        seriousViolations:
          type: integer
        violations:
          type: array
          items:
            $ref: "#/components/schemas/AuditViolation"
        passedChecks:
          type: integer
        totalChecks:
          type: integer
        scannedAt:
          type: string
          format: date-time
      required:
        - score
        - level
        - totalViolations
        - criticalViolations
        - seriousViolations
        - violations
        - passedChecks
        - totalChecks
        - scannedAt

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

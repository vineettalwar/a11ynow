kind = "web"
previewPath = "/"
title = "accessibility.now"
version = "1.0.0"
id = "artifacts/accessibility-now"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24464

[services.development]
run = "pnpm --filter @workspace/accessibility-now run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/accessibility-now", "run", "build" ]
publicDir = "artifacts/accessibility-now/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24464"
BASE_PATH = "/"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm --filter @workspace/accessibility-now run test

      - name: Build
        run: pnpm --filter @workspace/accessibility-now run build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci

  opennext:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build OpenNext Worker bundle
        run: pnpm --filter @workspace/accessibility-now run build:opennext
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
